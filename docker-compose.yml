services:
  # 1. Database Service
  postgres:
    image: postgres:15-alpine
    container_name: qlass_db         
    restart: always
    ports:
      - "${DB_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - qlass_postgres_data:/var/lib/postgresql/data
    networks:
      - qlass_network                 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. GUI Database Manager
  dbgate:
    image: dbgate/dbgate
    container_name: qlass_dbgate
    restart: always
    ports:
      - "5050:3000" 
    volumes:
      - qlass_dbgate_data:/root/.dbgate 
    networks:
      - qlass_network

  # 3. Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: qlass_redis
    restart: always
    ports:
      - "${REDIS_PORT}:6379"
    environment:
      REDIS_USERNAME: ${REDIS_USERNAME}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      /bin/sh -c "
      echo 'user default on >${REDIS_PASSWORD} ~* +@all' > /data/users.acl &&
      if [ -n '${REDIS_USERNAME}' ] && [ '${REDIS_USERNAME}' != 'default' ]; then echo 'user ${REDIS_USERNAME} on >${REDIS_PASSWORD} ~* +@all' >> /data/users.acl; fi &&
      redis-server --aclfile /data/users.acl --appendonly yes
      "
    volumes:
      - qlass_redis_data:/data
    networks:
      - qlass_network
    healthcheck:
      test: [ "CMD-SHELL", "redis-cli -a ${REDIS_PASSWORD} ping | grep PONG" ]
      interval: 5s
      timeout: 3s
      retries: 5

# 3. Define Volumes
volumes:
  qlass_postgres_data:
  qlass_dbgate_data:
  qlass_redis_data:

networks:
  qlass_network:
    driver: bridge